<!DOCTYPE html>
<html lang="ru" data-theme="red">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ACCESS // SLAVES.SU</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
  <script src="https://www.google.com/recaptcha/api.js?render=6LcIwY0sAAAAALnE-RjBoQ7BhhE2hg01zuqal7Rj"></script>
  <style>
    :root{--acc:#dc2626;--acc-dim:rgba(220,38,38,.12);--acc-glow:rgba(220,38,38,.5);--acc-border:rgba(220,38,38,.3);--acc-bright:rgba(220,38,38,.6);--bg:#000;--bg2:#0a0a0a;--text:#ccc;--text-dim:#444;--font-mono:'Share Tech Mono',monospace;--font-head:'Orbitron',monospace;--font-body:'Rajdhani',sans-serif}
    [data-theme="cyan"]{--acc:#0ea5e9;--acc-dim:rgba(14,165,233,.12);--acc-glow:rgba(14,165,233,.5);--acc-border:rgba(14,165,233,.3);--acc-bright:rgba(14,165,233,.6);--bg2:#080d12}
    [data-theme="green"]{--acc:#16a34a;--acc-dim:rgba(22,163,74,.12);--acc-glow:rgba(22,163,74,.5);--acc-border:rgba(22,163,74,.3);--acc-bright:rgba(22,163,74,.6);--bg2:#070a08}
    [data-theme="purple"]{--acc:#9333ea;--acc-dim:rgba(147,51,234,.12);--acc-glow:rgba(147,51,234,.5);--acc-border:rgba(147,51,234,.3);--acc-bright:rgba(147,51,234,.6);--bg2:#09060e}
    [data-theme="orange"]{--acc:#ea580c;--acc-dim:rgba(234,88,12,.12);--acc-glow:rgba(234,88,12,.5);--acc-border:rgba(234,88,12,.3);--acc-bright:rgba(234,88,12,.6);--bg2:#0d0900}

    *{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;overflow:hidden;background:var(--bg)}
    body{font-family:var(--font-body);color:var(--text);cursor:crosshair;display:flex;align-items:center;justify-content:center}

    /* grid bg */
    body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
      background-image:linear-gradient(var(--acc-dim) 1px,transparent 1px),linear-gradient(90deg,var(--acc-dim) 1px,transparent 1px);
      background-size:44px 44px;opacity:.4}
    body::after{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
      background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.05) 2px,rgba(0,0,0,.05) 4px)}

    /* scan beam */
    .scan-line{position:fixed;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--acc),transparent);opacity:.25;animation:scanBeam 8s linear infinite;z-index:1;pointer-events:none}
    @keyframes scanBeam{0%{top:-1px;opacity:0}3%{opacity:.25}97%{opacity:.1}100%{top:100%;opacity:0}}

    /* vignette */
    .vignette{position:fixed;inset:0;z-index:1;pointer-events:none;background:radial-gradient(ellipse at 50% 50%,transparent 40%,rgba(0,0,0,.85) 100%)}

    /* main box */
    .box{position:relative;z-index:2;width:420px;background:rgba(6,6,6,.97);border:1px solid var(--acc-border);animation:boxIn .35s cubic-bezier(.4,0,.2,1)}
    @keyframes boxIn{from{opacity:0;transform:translateY(20px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}

    /* top accent line */
    .box::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--acc),transparent)}

    /* hud corners */
    .hc{position:absolute;width:12px;height:12px}
    .hc-tl{top:-1px;left:-1px;border-top:2px solid var(--acc);border-left:2px solid var(--acc)}
    .hc-tr{top:-1px;right:-1px;border-top:2px solid var(--acc);border-right:2px solid var(--acc)}
    .hc-bl{bottom:-1px;left:-1px;border-bottom:2px solid var(--acc);border-left:2px solid var(--acc)}
    .hc-br{bottom:-1px;right:-1px;border-bottom:2px solid var(--acc);border-right:2px solid var(--acc)}

    /* header */
    .hdr{padding:20px 24px 16px;border-bottom:1px solid var(--acc-border)}
    .hdr-title{font-family:var(--font-head);font-size:18px;font-weight:900;color:var(--acc);letter-spacing:.2em;text-shadow:0 0 18px var(--acc-glow)}
    .hdr-sub{font-family:var(--font-mono);font-size:9px;color:var(--text-dim);letter-spacing:.12em;margin-top:4px}

    /* tabs */
    .tabs{display:flex;border-bottom:1px solid var(--acc-border)}
    .tab{flex:1;padding:11px;font-family:var(--font-mono);font-size:10px;letter-spacing:.12em;color:var(--text-dim);text-align:center;cursor:pointer;border:none;background:none;transition:all .2s;border-bottom:2px solid transparent}
    .tab:hover{color:var(--text);background:rgba(255,255,255,.02)}
    .tab.active{color:var(--acc);border-bottom-color:var(--acc);background:var(--acc-dim);text-shadow:0 0 8px var(--acc-glow)}

    /* form */
    .form-wrap{padding:22px 24px;display:flex;flex-direction:column;gap:14px}
    .field-label{font-family:var(--font-mono);font-size:8px;color:var(--text-dim);letter-spacing:.15em;text-transform:uppercase;margin-bottom:5px}
    .field-input{background:rgba(0,0,0,.7);border:1px solid var(--acc-border);color:var(--text);font-family:var(--font-mono);font-size:12px;padding:10px 12px;outline:none;width:100%;transition:border-color .2s;letter-spacing:.05em}
    .field-input:focus{border-color:var(--acc-bright);box-shadow:0 0 0 2px var(--acc-dim)}
    .field-input::placeholder{color:var(--text-dim)}

    .btn-submit{background:var(--acc);color:#000;font-family:var(--font-mono);font-size:11px;font-weight:700;letter-spacing:.12em;padding:12px;border:none;cursor:pointer;width:100%;transition:all .18s;text-transform:uppercase;clip-path:polygon(0 0,calc(100% - 8px) 0,100% 8px,100% 100%,8px 100%,0 calc(100% - 8px))}
    .btn-submit:hover{filter:brightness(1.12);box-shadow:0 0 20px var(--acc-glow)}
    .btn-submit:active{transform:scale(.98)}

    .err-box{background:rgba(220,38,38,.08);border:1px solid rgba(220,38,38,.35);padding:9px 12px;font-family:var(--font-mono);font-size:10px;color:#f87171;letter-spacing:.06em;display:flex;align-items:center;gap:7px}
    .ok-box{background:rgba(22,163,74,.08);border:1px solid rgba(22,163,74,.35);padding:9px 12px;font-family:var(--font-mono);font-size:10px;color:#4ade80;letter-spacing:.06em;display:flex;align-items:center;gap:7px}

    .check-row{display:flex;align-items:center;gap:8px;cursor:pointer}
    .check-row input{accent-color:var(--acc);width:14px;height:14px;cursor:pointer}
    .check-label{font-family:var(--font-mono);font-size:10px;color:var(--text-dim);letter-spacing:.06em}

    /* recaptcha wrapper */
    .cap-wrap{display:flex;justify-content:center;transform:scale(.9);transform-origin:center}

    /* theme bar */
    .theme-row{padding:10px 24px;border-top:1px solid var(--acc-border);display:flex;align-items:center;gap:8px;background:rgba(0,0,0,.4)}
    .tc{width:12px;height:12px;cursor:pointer;border:1px solid transparent;clip-path:polygon(0 0,calc(100% - 4px) 0,100% 4px,100% 100%,0 100%);transition:transform .15s;flex-shrink:0}
    .tc:hover{transform:scale(1.3)}
    .tc.active{border-color:rgba(255,255,255,.6)!important}
    .tc-label{font-family:var(--font-mono);font-size:7px;color:var(--text-dim);letter-spacing:.12em;margin-right:4px}

    /* status dot */
    .s-dot{width:5px;height:5px;border-radius:50%;background:#4ade80;box-shadow:0 0 5px #4ade80;animation:pulse 2s ease-in-out infinite;flex-shrink:0}
    @keyframes pulse{50%{opacity:.3;box-shadow:none}}
  </style>
</head>
<body>
<div class="scan-line"></div>
<div class="vignette"></div>

<div class="box">
  <div class="hc hc-tl"></div><div class="hc hc-tr"></div>
  <div class="hc hc-bl"></div><div class="hc hc-br"></div>

  <!-- HEADER -->
  <div class="hdr">
    <div style="display:flex;align-items:center;justify-content:space-between">
      <div>
        <div class="hdr-title">⛓ SLAVES.SU</div>
        <div class="hdr-sub">CONTROL PANEL ACCESS TERMINAL</div>
      </div>
      <div style="display:flex;align-items:center;gap:6px">
        <div class="s-dot"></div>
        <span style="font-family:var(--font-mono);font-size:8px;color:#4ade80;letter-spacing:.1em">ONLINE</span>
      </div>
    </div>
  </div>

  <!-- TABS -->
  <div class="tabs">
    <button class="tab {% if reg_ok or reg_error %}{% else %}active{% endif %}" id="tab-login" onclick="switchTab('login')">◈ ВОЙТИ</button>
    <button class="tab {% if reg_ok or reg_error %}active{% endif %}"             id="tab-reg"   onclick="switchTab('reg')">◎ РЕГИСТРАЦИЯ</button>
  </div>

  <!-- LOGIN FORM -->
  <div id="form-login" style="display:{% if reg_ok or reg_error %}none{% else %}block{% endif %}">
    <form method="post" action="/login" class="form-wrap">
      {% if login_error %}
      <div class="err-box"><span>[ERR]</span><span>{{ login_error }}</span></div>
      {% endif %}

      <div>
        <div class="field-label">// ЛОГИН</div>
        <input class="field-input" type="text" name="username" placeholder="USERNAME" autocomplete="username" required>
      </div>
      <div>
        <div class="field-label">// ПАРОЛЬ</div>
        <div style="position:relative">
          <input class="field-input" type="password" name="password" id="pw-login" placeholder="PASSWORD" autocomplete="current-password" required>
          <button type="button" onclick="togglePw('pw-login',this)" style="position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-family:var(--font-mono);font-size:9px;color:var(--text-dim);letter-spacing:.06em;transition:color .15s" onmouseover="this.style.color='var(--acc)'" onmouseout="this.style.color='var(--text-dim)'">SHOW</button>
        </div>
      </div>

      <label class="check-row">
        <input type="checkbox" name="remember">
        <span class="check-label">ЗАПОМНИТЬ НА 7 ДНЕЙ</span>
      </label>

      <input type="hidden" name="g-recaptcha-response" id="cap-login">
      <button type="submit" class="btn-submit" id="btn-login">▶ ВОЙТИ В СИСТЕМУ</button>
    </form>
  </div>

  <!-- REGISTER FORM -->
  <div id="form-reg" style="display:{% if reg_ok or reg_error %}block{% else %}none{% endif %}">
    <form method="post" action="/register" class="form-wrap">
      {% if reg_error %}
      <div class="err-box"><span>[ERR]</span><span>{{ reg_error }}</span></div>
      {% endif %}
      {% if reg_ok %}
      <div class="ok-box"><span>[OK]</span><span>Аккаунт создан — войди</span></div>
      {% endif %}

      <div>
        <div class="field-label">// ЛОГИН</div>
        <input class="field-input" type="text" name="username" placeholder="MIN 3 CHARS" autocomplete="username" required>
      </div>
      <div>
        <div class="field-label">// EMAIL (ОПЦИОНАЛЬНО)</div>
        <input class="field-input" type="email" name="email" placeholder="user@example.com" autocomplete="email">
      </div>
      <div>
        <div class="field-label">// ПАРОЛЬ</div>
        <div style="position:relative">
          <input class="field-input" type="password" name="password" id="pw-reg" placeholder="MIN 6 CHARS" autocomplete="new-password" required>
          <button type="button" onclick="togglePw('pw-reg',this)" style="position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-family:var(--font-mono);font-size:9px;color:var(--text-dim);letter-spacing:.06em;transition:color .15s" onmouseover="this.style.color='var(--acc)'" onmouseout="this.style.color='var(--text-dim)'">SHOW</button>
        </div>
      </div>
      <div>
        <div class="field-label">// ПОВТОР ПАРОЛЯ</div>
        <input class="field-input" type="password" name="password2" placeholder="REPEAT PASSWORD" autocomplete="new-password" required>
      </div>

      <input type="hidden" name="g-recaptcha-response" id="cap-reg">
      <button type="submit" class="btn-submit" id="btn-reg">◎ СОЗДАТЬ АККАУНТ</button>
    </form>
  </div>

  <!-- THEME BAR -->
  <div class="theme-row">
    <span class="tc-label">THEME:</span>
    <div class="tc active" data-t="red"    style="background:#dc2626" onclick="setTheme('red')"></div>
    <div class="tc"        data-t="cyan"   style="background:#0ea5e9" onclick="setTheme('cyan')"></div>
    <div class="tc"        data-t="green"  style="background:#16a34a" onclick="setTheme('green')"></div>
    <div class="tc"        data-t="purple" style="background:#9333ea" onclick="setTheme('purple')"></div>
    <div class="tc"        data-t="orange" style="background:#ea580c" onclick="setTheme('orange')"></div>
    <div style="margin-left:auto;font-family:var(--font-mono);font-size:8px;color:var(--text-dim);letter-spacing:.1em" id="clock"></div>
  </div>
</div>

<script>
function switchTab(t){
  document.getElementById('form-login').style.display = t==='login'?'block':'none';
  document.getElementById('form-reg').style.display   = t==='reg'?'block':'none';
  document.getElementById('tab-login').className = 'tab'+(t==='login'?' active':'');
  document.getElementById('tab-reg').className   = 'tab'+(t==='reg'?' active':'');
}
function togglePw(id,btn){
  const el=document.getElementById(id);
  const show=el.type==='password';
  el.type=show?'text':'password';
  btn.textContent=show?'HIDE':'SHOW';
}
function setTheme(t){
  document.documentElement.setAttribute('data-theme',t);
  localStorage.setItem('slv_theme',t);
  document.querySelectorAll('.tc').forEach(e=>e.classList.toggle('active',e.dataset.t===t));
}
(function(){
  const t=localStorage.getItem('slv_theme')||'red';
  setTheme(t);
  function tick(){
    const n=new Date(),pad=v=>String(v).padStart(2,'0');
    document.getElementById('clock').textContent=pad(n.getHours())+':'+pad(n.getMinutes())+':'+pad(n.getSeconds());
  }
  setInterval(tick,1000);tick();
})();

// reCAPTCHA v3 — невидимая, токен вставляется при сабмите
const RCKEY = '6LcIwY0sAAAAALnE-RjBoQ7BhhE2hg01zuqal7Rj';

function bindCaptchaForm(formSelector, inputId, action) {
  const form = document.querySelector(formSelector);
  if (!form) return;
  form.addEventListener('submit', function(e) {
    e.preventDefault();
    const f = this;
    if (typeof grecaptcha === 'undefined') { f.submit(); return; }
    grecaptcha.ready(function() {
      grecaptcha.execute(RCKEY, {action: action}).then(function(token) {
        document.getElementById(inputId).value = token;
        f.submit();
      }).catch(function() { f.submit(); }); // не блокировать если ошибка
    });
  });
}

document.addEventListener('DOMContentLoaded', function() {
  bindCaptchaForm('#form-login form',   'cap-login', 'login');
  bindCaptchaForm('#form-reg form',     'cap-reg',   'register');
});
</script>
</body>
</html>
